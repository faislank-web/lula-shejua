name: Dhisa Forwarder System

on:
  schedule:
    - cron: '0 */2 * * *' # Otomatis jalan setiap 6 jam
  workflow_dispatch:      # Tombol manual

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          # Penting: Mengambil riwayat agar git push tidak error
          fetch-depth: 0 

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install telethon pytz

      - name: Run Dhisa Forwarder
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        run: python dhisa_forward.py

      - name: Simpan Progres (Update Last ID)
        run: |
          # Memastikan file ada meskipun baru pertama kali jalan
          touch last_id.txt 
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_id.txt
          # Menambahkan [skip ci] agar tidak terjadi perulangan workflow
          git commit -m "Update Last ID: $(cat last_id.txt) [skip ci]" || echo "Tidak ada perubahan ID"
          git push origin main
